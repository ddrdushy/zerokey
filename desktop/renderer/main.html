<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ZeroKey</title>
    <link rel="stylesheet" href="activate.css" />
    <link rel="stylesheet" href="main.css" />
  </head>
  <body class="app">
    <!-- License-policy banner. JS hides/shows + colours based on
         status. -->
    <div id="banner" class="banner" hidden></div>

    <header class="topbar">
      <div class="brand">
        <span class="dot"></span>
        ZeroKey
        <span id="topbar-org" class="org-name"></span>
      </div>
      <div class="topbar-right">
        <span id="topbar-plan" class="plan-badge"></span>
        <button id="sign-out" type="button" class="ghost">Sign out</button>
      </div>
    </header>

    <main class="main">
      <section class="card-stack">
        <article class="card">
          <h2>Invoices</h2>
          <p class="muted" id="invoices-meta">Loading…</p>
          <ul class="invoice-list" id="invoice-list"></ul>
          <p class="muted small">
            Phase 3+ lands document ingestion. For now this proves the
            renderer can talk to the local sidecar with your entitlement.
          </p>
        </article>

        <article class="card">
          <h2>Sidecar</h2>
          <dl class="kv">
            <dt>URL</dt><dd id="sc-url">—</dd>
            <dt>Identity</dt><dd id="sc-me">—</dd>
            <dt>Last heartbeat</dt><dd id="sc-heartbeat">—</dd>
            <dt>Heartbeat failures</dt><dd id="sc-hb-fail">0</dd>
          </dl>
        </article>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
